<!DOCTYPE html>
<html lang="az" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <title>Qeydiyyat ‚ÄĒ ANONIM SHOP AZ</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
<div class="scanline-effect"></div>

<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem;">
  <div style="width:100%; max-width:420px;">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:2rem;">
      <a href="index.html" style="font-family:'Share Tech Mono',monospace; font-size:1.4rem; color:var(--accent); text-decoration:none; letter-spacing:3px;">
        [ANONIM SHOP AZ]
      </a>
      <p style="color:var(--text-secondary); font-size:0.85rem; margin-top:0.5rem; font-family:'Share Tech Mono',monospace;">
        // CREATE ACCOUNT
      </p>
    </div>

    <!-- Card -->
    <div class="card" style="padding:2rem;">
      <div style="margin-bottom:1.75rem;">
        <h2 style="font-family:'Share Tech Mono',monospace; color:var(--accent); font-size:1rem; letter-spacing:2px; margin-bottom:0.25rem;">QEYDńįYYAT</h2>
        <p style="color:var(--text-secondary); font-size:0.85rem;">Anonim hesab yarat</p>
      </div>

      <form id="registerForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" id="username" class="form-input" placeholder="min 4 h…ôrf/r…ôq…ôm"
                 autocomplete="off" minlength="4" maxlength="32" required
                 pattern="[a-zA-Z0-9_]+"
                 title="YalnńĪz h…ôrf, r…ôq…ôm v…ô _ iŇüar…ôsi">
          <div id="usernameHint" style="font-size:0.75rem; color:var(--text-muted); margin-top:0.25rem; font-family:'Share Tech Mono',monospace;"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Ňěifr…ô</label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-input" placeholder="min 6 simvol"
                   autocomplete="new-password" minlength="6" maxlength="128" required>
            <button type="button" id="togglePwd" style="
              position:absolute; right:0.75rem; top:50%; transform:translateY(-50%);
              background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:1rem;
            ">ūüĎĀ</button>
          </div>
          <!-- Password strength -->
          <div id="strengthBar" style="margin-top:0.4rem; height:3px; background:var(--border); border-radius:2px;">
            <div id="strengthFill" style="height:100%; border-radius:2px; width:0; transition:width 0.3s, background 0.3s;"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Ňěifr…ôni t…ôsdiql…ô</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Ňüifr…ôni t…ôkrar daxil et"
                 autocomplete="new-password" maxlength="128" required>
          <div id="confirmError" style="display:none; color:var(--error); font-size:0.75rem; margin-top:0.25rem; font-family:'Share Tech Mono',monospace;"></div>
        </div>

        <!-- Info box -->
        <div style="background:rgba(0,255,157,0.05); border:1px solid var(--border-glow); border-radius:4px; padding:0.75rem; margin-bottom:1.25rem; font-size:0.8rem; color:var(--text-secondary);">
          <span style="color:var(--accent);">‚ĄĻ</span>
          He√ß bir Ňü…ôxsi m…ôlumat t…ôl…ôb olunmur. YalnńĪz username v…ô Ňüifr…ô.
        </div>

        <div id="errorMsg" style="display:none; background:rgba(255,0,85,0.1); border:1px solid var(--error); border-radius:4px; padding:0.6rem 0.9rem; color:var(--error); font-size:0.85rem; margin-bottom:1rem; font-family:'Share Tech Mono',monospace;"></div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
          HESAB YARAT
        </button>
      </form>

      <div style="text-align:center; margin-top:1.5rem; color:var(--text-secondary); font-size:0.85rem;">
        ArtńĪq hesabńĪn var? 
        <a href="login.html" style="color:var(--accent); text-decoration:none; font-weight:600;">GiriŇü et</a>
      </div>
    </div>

    <div style="text-align:center; margin-top:1rem;">
      <a href="index.html" style="color:var(--text-muted); font-size:0.8rem; text-decoration:none; font-family:'Share Tech Mono',monospace;">
        ‚Üź ANA S∆ŹHńįF∆ŹY∆Ź QAYIT
      </a>
    </div>

    <div style="text-align:center; margin-top:1rem;">
      <button class="theme-toggle" id="themeToggle" title="Modu d…ôyiŇü"></button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = 'index.html';

  document.getElementById('themeToggle').onclick = () => Theme.toggle();
  document.getElementById('togglePwd').onclick = () => {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  };

  // Username availability check
  let usernameTimeout;
  document.getElementById('username').oninput = (e) => {
    clearTimeout(usernameTimeout);
    const val = e.target.value.trim();
    const hint = document.getElementById('usernameHint');

    if (val.length < 4) {
      hint.textContent = val.length > 0 ? `// ${4 - val.length} simvol daha lazńĪmdńĪr` : '';
      hint.style.color = 'var(--text-muted)';
      return;
    }

    if (!/^[a-zA-Z0-9_]+$/.test(val)) {
      hint.textContent = '// YalnńĪz h…ôrf, r…ôq…ôm v…ô _ iŇüar…ôsi';
      hint.style.color = 'var(--error)';
      return;
    }

    hint.textContent = '// yoxlanńĪlńĪr...';
    hint.style.color = 'var(--text-muted)';

    usernameTimeout = setTimeout(async () => {
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/users/${val}`);
        if (res.status === 404) {
          hint.textContent = '// ‚úď m√∂vcuddur';
          hint.style.color = 'var(--success)';
        } else if (res.ok) {
          hint.textContent = '// ‚úó artńĪq istifad…ô olunur';
          hint.style.color = 'var(--error)';
        }
      } catch {
        hint.textContent = '';
      }
    }, 600);
  };

  // Password strength
  document.getElementById('password').oninput = (e) => {
    const val = e.target.value;
    const fill = document.getElementById('strengthFill');
    let strength = 0;
    if (val.length >= 6) strength++;
    if (val.length >= 10) strength++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const colors = ['', '#ff0055', '#ff8800', '#ffaa00', '#00aaff', '#00ff9d'];
    const widths = ['0%', '20%', '40%', '60%', '80%', '100%'];
    fill.style.width = widths[strength];
    fill.style.background = colors[strength];
  };

  // Confirm password
  document.getElementById('confirmPassword').oninput = () => {
    const pwd = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const err = document.getElementById('confirmError');
    if (confirm && pwd !== confirm) {
      err.textContent = '// Ňěifr…ôl…ôr uyńüun g…ôlmir';
      err.style.display = 'block';
    } else {
      err.style.display = 'none';
    }
  };

  document.getElementById('registerForm').onsubmit = async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('submitBtn');
    const errMsg = document.getElementById('errorMsg');

    if (password !== confirmPassword) {
      errMsg.textContent = '// Ňěifr…ôl…ôr uyńüun g…ôlmir.';
      errMsg.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="loader" style="width:16px;height:16px;border-width:2px;"></span> YARADILIR...';
    errMsg.style.display = 'none';

    try {
      const res = await fetch(`${CONFIG.API_URL}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (res.ok) {
        Auth.setTokens(data.accessToken, data.refreshToken, data.user);
        window.location.href = 'index.html';
      } else {
        errMsg.textContent = `// ${data.error || 'Qeydiyyat uńüursuz oldu.'}`;
        errMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'HESAB YARAT';
      }
    } catch (error) {
      errMsg.textContent = '// Server x…ôtasńĪ. Yenid…ôn c…ôhd et.';
      errMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'HESAB YARAT';
    }
  };
</script>
</body>
</html>
