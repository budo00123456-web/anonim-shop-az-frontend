<!DOCTYPE html>
<html lang="az" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <title>Giriş — ANONIM SHOP AZ</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
<div class="scanline-effect"></div>
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem;">
  <div style="width:100%; max-width:420px;">
    <div style="text-align:center; margin-bottom:2rem;">
      <a href="index.html" style="font-family:'Share Tech Mono',monospace; font-size:1.4rem; color:var(--accent); text-decoration:none; letter-spacing:3px;">[ANONIM SHOP AZ]</a>
      <p style="color:var(--text-secondary); font-size:0.85rem; margin-top:0.5rem; font-family:'Share Tech Mono',monospace;">// ACCESS TERMINAL</p>
    </div>
    <div class="card" style="padding:2rem;">
      <div style="margin-bottom:1.75rem;">
        <h2 style="font-family:'Share Tech Mono',monospace; color:var(--accent); font-size:1rem; letter-spacing:2px; margin-bottom:0.25rem;">GİRİŞ</h2>
        <p style="color:var(--text-secondary); font-size:0.85rem;">Hesabına daxil ol</p>
      </div>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" id="username" class="form-input" placeholder="username_az" autocomplete="username" maxlength="32" required>
        </div>
        <div class="form-group">
          <label class="form-label">Şifrə</label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" maxlength="128" required>
            <button type="button" id="togglePwd" style="position:absolute; right:0.75rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:1rem;">👁</button>
          </div>
        </div>
        <div id="errorMsg" style="display:none; background:rgba(255,0,85,0.1); border:1px solid var(--error); border-radius:4px; padding:0.6rem 0.9rem; color:var(--error); font-size:0.85rem; margin-bottom:1rem; font-family:'Share Tech Mono',monospace;"></div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">GİRİŞ ET</button>
      </form>
      <div style="text-align:center; margin-top:1.5rem; color:var(--text-secondary); font-size:0.85rem;">
        Hesabın yoxdur? <a href="register.html" style="color:var(--accent); text-decoration:none; font-weight:600;">Qeydiyyat</a>
      </div>
    </div>
    <div style="text-align:center; margin-top:1rem;">
      <a href="index.html" style="color:var(--text-muted); font-size:0.8rem; text-decoration:none; font-family:'Share Tech Mono',monospace;">← ANA SƏHİFƏYƏ QAYIT</a>
    </div>
    <div style="text-align:center; margin-top:1rem;">
      <button class="theme-toggle" id="themeToggle" title="Modu dəyiş"></button>
    </div>
  </div>
</div>
<script src="config.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = 'index.html';
  document.getElementById('themeToggle').onclick = () => Theme.toggle();
  document.getElementById('togglePwd').onclick = () => {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  };
  document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    const errMsg = document.getElementById('errorMsg');
    if (!username || !password) { errMsg.textContent = '// Username və şifrə tələb olunur.'; errMsg.style.display = 'block'; return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="loader" style="width:16px;height:16px;border-width:2px;"></span> GİRİŞ...';
    errMsg.style.display = 'none';
    try {
      const res = await fetch(`${CONFIG.API_URL}/api/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
      const data = await res.json();
      if (res.ok) { Auth.setTokens(data.accessToken, data.refreshToken, data.user); window.location.href = 'index.html'; }
      else { errMsg.textContent = `// ${data.error || 'Giriş uğursuz oldu.'}`; errMsg.style.display = 'block'; btn.disabled = false; btn.textContent = 'GİRİŞ ET'; }
    } catch (error) { errMsg.textContent = '// Server xətası. Yenidən cəhd et.'; errMsg.style.display = 'block'; btn.disabled = false; btn.textContent = 'GİRİŞ ET'; }
  };
</script>
</body>
</html>
